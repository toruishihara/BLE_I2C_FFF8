# Enable the I2C driver
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_LOG=y

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_EXT_ADV=n
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="BLE_FFF8"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n
#CONFIG_BT_GATT=y

# --- Flash and settings ---
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y